name: Bug Report
description: Report a reproducible issue with Xense MCAP Viewer
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the form below as completely as possible.

  - type: dropdown
    id: format
    attributes:
      label: File format
      description: Which file format were you using when the issue occurred?
      options:
        - MCAP (.mcap)
        - ROS 1 bag (.bag)
        - ROS 2 db3 (.db3)
        - HDF5 (.h5 / .hdf5)
        - BVH (.bvh)
        - Not file-format specific
    validations:
      required: true

  - type: dropdown
    id: delivery
    attributes:
      label: Delivery mode
      options:
        - SPA (self-hosted / local dev server)
        - Embedded npm package
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: What version of xense-mcap-viewer are you using? (run `npm list @xense-robotics/mcap-viewer`)
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome / Chromium
        - Edge
        - Firefox
        - Safari
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14, Windows 11, Ubuntu 24.04, …"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps to reliably reproduce the issue.
      placeholder: |
        1. Open the SPA (local dev server)
        2. Load a .mcap file via drag-and-drop
        3. Click Play
        4. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages from the browser console if available.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Browser console errors
      description: Paste any relevant errors from the browser DevTools console (F12 → Console).
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, screen recordings, sample files (if shareable), or any other context.
